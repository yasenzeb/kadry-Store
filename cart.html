<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KADRY Store - السلة</title>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>* { font-family:'Cairo',sans-serif; }</style>
</head>
<body class="bg-gray-50 text-black" x-data="cartPage()" x-init="init()">

<nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
    <a href="index.html" class="flex items-center gap-2">
      <span class="text-black font-black text-xl tracking-widest">KADRY Store</span>
    </a>
    <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-black transition"><i class="fas fa-arrow-right ml-1"></i>متابعة التسوق</a>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-black mb-8 flex items-center gap-3">
    <i class="fas fa-shopping-cart text-black"></i> سلة المشتريات
    <span class="text-gray-400 text-lg font-bold" x-text="'('+cart.length+' منتج)'"></span>
  </h1>

  <!-- Empty -->
  <template x-if="cart.length===0">
    <div class="text-center py-24">
      <div class="text-8xl mb-6">🛒</div>
      <p class="text-2xl font-black mb-3">السلة فاضية!</p>
      <p class="text-gray-500 mb-8">اضغط على أي منتج وأضفه للسلة</p>
      <a href="index.html" class="bg-black text-white font-black px-10 py-4 rounded-full hover:bg-gray-800 transition text-lg">تسوق الآن</a>
    </div>
  </template>

  <template x-if="cart.length>0">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Cart Items -->
    <div class="lg:col-span-2 space-y-4">
      <template x-for="(item,idx) in cart" :key="idx">
        <div class="bg-white rounded-2xl p-4 flex items-center gap-4 shadow-sm border border-gray-100">
          <img :src="item.image_url || 'https://placehold.co/100x100/111/ffffff?text=K'"
               :alt="item.name" class="w-24 h-24 object-cover rounded-xl flex-shrink-0"/>
          <div class="flex-1 min-w-0">
            <h3 class="font-black text-base leading-snug mb-1 truncate" x-text="item.name"></h3>
            <div class="flex gap-3 text-xs text-gray-500 mb-2 flex-wrap">
              <span x-show="item.size"><i class="fas fa-ruler-horizontal ml-1 text-black"></i>مقاس: <b x-text="item.size"></b></span>
              <span x-show="item.color"><i class="fas fa-palette ml-1 text-black"></i>لون: <b x-text="item.color"></b></span>
            </div>
            <div class="flex items-center justify-between flex-wrap gap-2">
              <span class="text-black font-black text-lg" x-text="'EGP '+(item.finalPrice||item.price)"></span>
              <!-- Qty controls -->
              <div class="flex items-center gap-2">
                <button @click="changeQty(idx,-1)" class="w-8 h-8 bg-gray-100 rounded-lg font-black hover:bg-gray-200 transition">−</button>
                <span class="w-8 text-center font-bold" x-text="item.qty||1"></span>
                <button @click="changeQty(idx,1)" class="w-8 h-8 bg-gray-100 rounded-lg font-black hover:bg-gray-200 transition">+</button>
              </div>
              <span class="font-black text-black" x-text="'EGP '+((item.finalPrice||item.price)*(item.qty||1))"></span>
            </div>
          </div>
          <button @click="removeItem(idx)" class="text-gray-300 hover:text-red-500 transition ml-2 flex-shrink-0">
            <i class="fas fa-trash text-lg"></i>
          </button>
        </div>
      </template>
    </div>

    <!-- Summary -->
    <div class="lg:col-span-1">
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 sticky top-24">
        <h2 class="text-xl font-black mb-6 border-b pb-4">ملخص الطلب</h2>

        <div class="space-y-3 text-sm mb-6">
          <div class="flex justify-between">
            <span class="text-gray-500">المجموع الفرعي</span>
            <span class="font-bold" x-text="'EGP '+subtotal"></span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">الشحن</span>
            <span class="font-bold text-gray-600">حسب المحافظه</span>
          </div>
          <div class="border-t pt-3 flex justify-between text-xl font-black">
            <span>الإجمالي</span>
            <span class="text-black" x-text="'EGP '+subtotal"></span>
          </div>
        </div>

        <a href="checkout.html" class="block w-full bg-black text-white font-black py-4 rounded-2xl text-center hover:bg-gray-800 transition text-lg mb-3">
          <i class="fas fa-credit-card ml-2"></i>إتمام الطلب
        </a>
        <a href="index.html" class="block w-full bg-gray-100 text-black font-bold py-3 rounded-2xl text-center hover:bg-gray-200 transition text-sm">
          متابعة التسوق
        </a>

        <div class="flex justify-center gap-4 mt-4 text-xs text-gray-400">
          <span><i class="fas fa-lock ml-1 text-black"></i>دفع آمن</span>
          <span><i class="fas fa-truck ml-1 text-black"></i>شحن سريع</span>
        </div>
      </div>
    </div>
  </div>
  </template>
</div>

<script>
function cartPage() {
  return {
    cart: [],

    init() {
      try { this.cart = JSON.parse(localStorage.getItem('kadry_cart')||'[]'); } catch { this.cart=[]; }
    },

    get subtotal() {
      return this.cart.reduce((s,i) => s + (i.finalPrice||i.price)*(i.qty||1), 0);
    },

    changeQty(idx, delta) {
      this.cart[idx].qty = Math.max(1, (this.cart[idx].qty||1)+delta);
      this.save();
    },

    removeItem(idx) {
      this.cart.splice(idx,1);
      this.save();
    },

    save() {
      localStorage.setItem('kadry_cart', JSON.stringify(this.cart));
    }
  }
}
</script>
</body>
</html>
