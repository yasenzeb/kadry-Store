<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KADRY Store - السلة</title>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>* { font-family:'Cairo',sans-serif; }</style>
</head>
<body class="bg-gray-50 text-black" x-data="cartPage()" x-init="init()">

<nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center justify-between h-16">
    <a href="index.html" class="flex items-center gap-2">
      <span class="text-black font-black text-xl tracking-widest">KADRY Store</span>
    </a>
    <a href="index.html" class="text-sm font-bold text-gray-600 hover:text-black transition"><i class="fas fa-arrow-right ml-1"></i>متابعة التسوق</a>
  </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-10">
  <h1 class="text-3xl font-black mb-8 flex items-center gap-3">
    <i class="fas fa-shopping-cart text-black"></i> سلة المشتريات
    <span class="text-gray-400 text-lg font-bold" x-text="'('+cart.length+' منتج)'"></span>
  </h1>

  <!-- Empty -->
  <template x-if="cart.length===0">
    <div class="text-center py-24">
      <div class="text-8xl mb-6">🛒</div>
      <p class="text-2xl font-black mb-3">السلة فاضية!</p>
      <p class="text-gray-500 mb-8">اضغط على أي منتج وأضفه للسلة</p>
      <a href="index.html" class="bg-black text-white font-black px-10 py-4 rounded-full hover:bg-gray-800 transition text-lg">تسوق الآن</a>
    </div>
  </template>

  <template x-if="cart.length>0">
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
    <!-- Cart Items -->
    <div class="lg:col-span-2 space-y-4">
      <template x-for="(item,idx) in cart" :key="idx">
        <div class="bg-white rounded-2xl p-4 flex items-center gap-4 shadow-sm border border-gray-100">
          <img :src="optimizeCloudinaryUrl(item.image_url, 150) || 'https://placehold.co/100x100/111/ffffff?text=K'"
               :alt="item.name" class="w-24 h-24 object-cover rounded-xl flex-shrink-0" loading="lazy"/>
          <div class="flex-1 min-w-0">
            <h3 class="font-black text-base leading-snug mb-1 truncate" x-text="item.name"></h3>
            <div class="flex gap-3 text-xs text-gray-500 mb-2 flex-wrap">
              <span x-show="item.size"><i class="fas fa-ruler-horizontal ml-1 text-black"></i>مقاس: <b x-text="item.size"></b></span>
              <span x-show="item.color"><i class="fas fa-palette ml-1 text-black"></i>لون: <b x-text="item.color"></b></span>
            </div>
            <div class="flex items-center justify-between flex-wrap gap-2">
              <span class="text-black font-black text-lg" x-text="'EGP '+(item.finalPrice||item.price)"></span>
              <!-- Qty controls -->
              <div class="flex items-center gap-2">
                <button @click="changeQty(idx,-1)" class="w-8 h-8 bg-gray-100 rounded-lg font-black hover:bg-gray-200 transition">−</button>
                <span class="w-8 text-center font-bold" x-text="item.qty||1"></span>
                <button @click="changeQty(idx,1)" class="w-8 h-8 bg-gray-100 rounded-lg font-black hover:bg-gray-200 transition">+</button>
              </div>
            </div>
          </div>
          <button @click="removeItem(idx)" class="text-gray-300 hover:text-red-500 transition p-2 text-xl">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </template>
    </div>

    <!-- Order Summary -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 h-fit">
      <h2 class="font-black text-xl mb-6">ملخص الطلب</h2>
      <div class="space-y-4 mb-6">
        <div class="flex justify-between text-gray-600">
          <span>المجموع الفرعي</span>
          <span class="font-bold text-black" x-text="'EGP '+subtotal"></span>
        </div>
        <div class="flex justify-between text-gray-600">
          <span>الشحن</span>
          <span class="font-bold text-green-600">يُحسب عند إتمام الطلب</span>
        </div>
        <div class="border-t pt-4 flex justify-between items-center">
          <span class="font-black text-lg">الإجمالي</span>
          <span class="font-black text-2xl text-black" x-text="'EGP '+subtotal"></span>
        </div>
      </div>
      <a href="checkout.html"
        class="w-full bg-black text-white font-black py-4 rounded-2xl hover:bg-gray-800 transition text-center block text-lg">
        متابعة إتمام الطلب <i class="fas fa-arrow-left mr-2"></i>
      </a>
      <a href="index.html" class="block text-center text-sm text-gray-400 font-bold mt-4 hover:text-black">
        متابعة التسوق
      </a>
    </div>
  </div>
  </template>
</div>

<!-- FLOATING CONTACT BUTTONS -->
<style>
.floating-contact {
  position: fixed;
  bottom: 24px;
  right: 16px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.floating-contact a {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  transition: all 0.2s ease-in-out;
  text-decoration: none;
  border: 2px solid #fff;
  font-size: 1.3rem;
}
.floating-contact a:hover {
  transform: scale(1.08);
}
.floating-phone { background: #000; }
.floating-wa { background: #25d366; box-shadow: 0 4px 20px rgba(37,211,102,0.45); }
@media(min-width:768px){ .floating-contact { bottom: 28px; right: 28px; } }
</style>

<div class="floating-contact">
  <a href="tel:01039450300" class="floating-phone" aria-label="اتصل بنا">
    <i class="fas fa-phone-alt"></i>
  </a>
  <a href="https://wa.me/201039450300" target="_blank" rel="noopener noreferrer" class="floating-wa" aria-label="تواصل معنا عبر واتساب">
    <i class="fab fa-whatsapp"></i>
  </a>
</div>

<script>
function optimizeCloudinaryUrl(url, width = 200) {
  if (!url) return '';
  if (url.includes('res.cloudinary.com')) {
    const parts = url.split('/upload/');
    if (parts.length === 2) {
      return `${parts[0]}/upload/w_${width},c_limit,q_auto,f_auto/${parts[1]}`;
    }
  }
  return url;
}

function cartPage() {
  return {
    cart: [],

    init() {
      try { this.cart = JSON.parse(localStorage.getItem('kadry_cart')||'[]'); } catch { this.cart=[]; }
    },

    get subtotal() {
      return this.cart.reduce((s,i) => s + (i.finalPrice||i.price)*(i.qty||1), 0);
    },

    changeQty(idx, delta) {
      this.cart[idx].qty = Math.max(1, (this.cart[idx].qty||1)+delta);
      this.save();
    },

    removeItem(idx) {
      this.cart.splice(idx,1);
      this.save();
    },

    save() {
      localStorage.setItem('kadry_cart', JSON.stringify(this.cart));
    }
  }
}
</script>
</body>
</html>
