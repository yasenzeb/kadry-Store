<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الطلب | ELBNA STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #050505; color: white; min-height: 100vh; }
        input, select, textarea { background: #111 !important; border: 1px solid #222 !important; color: white !important; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #eab308 !important; outline: none; box-shadow: 0 0 10px rgba(234, 179, 8, 0.1); }
        select:focus { border-color: #eab308 !important; outline: none; }
        .checkout-card { background: #0a0a0a; border: 1px solid #1a1a1a; }
    </style>
</head>
<body class="pb-10">

    <nav class="p-6 border-b border-white/5 mb-10">
        <div class="container mx-auto">
            <a href="index.html" class="text-3xl font-black italic text-yellow-500 tracking-wider">
                ELBNA <span class="text-white ml-1">STORE</span>
            </a>
        </div>
    </nav>

    <div class="container mx-auto px-6 max-w-4xl">
        <div id="errorBanner" class="hidden mb-6 bg-red-950/80 border border-red-500/50 text-red-200 p-4 rounded-xl text-center font-bold">
            يرجى تصحيح البيانات المدخلة قبل المتابعة.
        </div>

        <div class="flex flex-col lg:flex-row gap-10">

            <!-- Order Summary -->
            <div class="lg:w-1/3 order-2 lg:order-1">
                <div class="checkout-card p-6 rounded-[2rem] sticky top-24 space-y-4">
                    <h2 class="text-xl font-black border-b border-white/5 pb-4 italic text-right">ملخص الطلب</h2>
                    <div class="text-center">
                        <img id="itemImg" src="" class="h-40 w-full object-contain mb-4 bg-black rounded-2xl p-4" onerror="this.src='https://placehold.co/280x160/111/eab308?text=ELBNA'">
                        <h3 id="itemName" class="text-lg font-bold text-yellow-500 mb-4">جاري التحميل...</h3>
                        <div class="space-y-3 border-t border-white/5 pt-4 text-sm text-gray-400">
                            <div class="flex justify-between">
                                <span>سعر المنتج:</span>
                                <span class="font-bold text-white"><span id="itemPrice">0</span> ج.م</span>
                            </div>
                            <div class="flex justify-between">
                                <span>تكلفة الشحن:</span>
                                <span class="font-bold text-white"><span id="shippingCost">0</span> ج.م</span>
                            </div>
                            <div class="flex justify-between text-base border-t border-white/5 pt-3 text-white font-black">
                                <span>الإجمالي الكلي:</span>
                                <span class="text-yellow-500"><span id="totalPrice">0</span> ج.م</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Form -->
            <div class="lg:w-2/3 order-1 lg:order-2 space-y-6">
                <div class="checkout-card p-8 rounded-[2.5rem]">
                    <h1 class="text-2xl font-black mb-6 italic text-right">بيانات <span class="text-yellow-500">الشحن</span></h1>

                    <form onsubmit="sendToWhatsApp(event)" class="space-y-6">
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400 text-right">الاسم بالكامل</label>
                            <input type="text" id="custName" oninput="validateNameInput()" required class="w-full p-4 rounded-xl text-right" placeholder="ادخل اسمك كاملاً">
                            <p id="nameError" class="hidden text-red-500 text-xs mt-1.5 text-right font-medium">من فضلك ادخل اسمك كاملاً.</p>
                        </div>

                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400 text-right">رقم الموبايل</label>
                            <input type="tel" id="custPhone" oninput="validatePhoneInput()" required class="w-full p-4 rounded-xl text-left" dir="ltr" placeholder="01xxxxxxxxx">
                            <p id="phoneError" class="hidden text-red-500 text-xs mt-1.5 text-right font-medium">ادخل رقم مصري صحيح (010/011/012/015).</p>
                        </div>

                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400 text-right">المحافظة</label>
                            <select id="custGov" onchange="handleGovChange()" required class="w-full p-4 rounded-xl text-right">
                                <option value="">— اختر محافظتك —</option>
                                <option value="القاهرة" data-price="85">القاهرة</option>
                                <option value="الجيزة" data-price="85">الجيزة</option>
                                <option value="الإسكندرية" data-price="55">الإسكندرية</option>
                                <option value="القليوبية" data-price="90">القليوبية</option>
                                <option value="الشرقية" data-price="95">الشرقية</option>
                                <option value="الدقهلية" data-price="95">الدقهلية</option>
                                <option value="الغربية" data-price="95">الغربية</option>
                                <option value="المنوفية" data-price="95">المنوفية</option>
                                <option value="البحيرة" data-price="95">البحيرة</option>
                                <option value="كفر الشيخ" data-price="100">كفر الشيخ</option>
                                <option value="دمياط" data-price="100">دمياط</option>
                                <option value="بورسعيد" data-price="100">بورسعيد</option>
                                <option value="الإسماعيلية" data-price="95">الإسماعيلية</option>
                                <option value="السويس" data-price="95">السويس</option>
                                <option value="الفيوم" data-price="110">الفيوم</option>
                                <option value="بني سويف" data-price="110">بني سويف</option>
                                <option value="المنيا" data-price="120">المنيا</option>
                                <option value="أسيوط" data-price="125">أسيوط</option>
                                <option value="سوهاج" data-price="130">سوهاج</option>
                                <option value="قنا" data-price="135">قنا</option>
                                <option value="الأقصر" data-price="140">الأقصر</option>
                                <option value="أسوان" data-price="145">أسوان</option>
                                <option value="البحر الأحمر" data-price="130">البحر الأحمر</option>
                                <option value="الوادي الجديد" data-price="150">الوادي الجديد</option>
                                <option value="مطروح" data-price="145">مطروح</option>
                                <option value="شمال سيناء" data-price="130">شمال سيناء</option>
                                <option value="جنوب سيناء" data-price="145">جنوب سيناء</option>
                            </select>
                            <p id="govError" class="hidden text-red-500 text-xs mt-1.5 text-right font-medium">اختر المحافظة.</p>
                        </div>

                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400 text-right">العنوان بالتفصيل</label>
                            <input type="text" id="custAddress" required class="w-full p-4 rounded-xl text-right" placeholder="الشارع، المنطقة، العمارة، رقم الشقة...">
                        </div>

                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-400 text-right">طريقة الدفع</label>
                            <select id="payMethod" class="w-full p-4 rounded-xl text-right">
                                <option value="كاش عند الاستلام">كاش عند الاستلام</option>
                            </select>
                        </div>

                        <button type="submit" class="w-full bg-yellow-500 text-black py-5 rounded-2xl font-black text-xl hover:bg-white hover:scale-[1.02] transition duration-300 shadow-xl shadow-yellow-500/10">
                            تأكيد الطلب 🚀
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
        let baseProductPrice = 0;
        let shippingCostAmount = 0;

        window.onload = function() {
            const name  = localStorage.getItem('selectedProduct') || '';
            const price = localStorage.getItem('selectedPrice')   || '0';
            const img   = localStorage.getItem('selectedImg')     || '';

            document.getElementById('itemName').innerText = name;
            document.getElementById('itemPrice').innerText = price;
            document.getElementById('itemImg').src = img;
            baseProductPrice = parseFloat(price) || 0;
            updateTotals();
        };

        function handleGovChange() {
            const sel = document.getElementById('custGov');
            const opt = sel.options[sel.selectedIndex];
            shippingCostAmount = parseInt(opt.dataset.price || 0);
            updateTotals();
        }

        function updateTotals() {
            document.getElementById('shippingCost').innerText = shippingCostAmount;
            document.getElementById('totalPrice').innerText   = baseProductPrice + shippingCostAmount;
        }

        function validateNameInput() {
            const val = document.getElementById('custName').value.trim();
            const err = document.getElementById('nameError');
            if (val.length >= 3) { err.classList.add('hidden'); return true; }
            err.classList.remove('hidden'); return false;
        }

        function validatePhoneInput() {
            const val = document.getElementById('custPhone').value.trim();
            const err = document.getElementById('phoneError');
            if (/^(010|011|012|015)\d{8}$/.test(val)) { err.classList.add('hidden'); return true; }
            err.classList.remove('hidden'); return false;
        }

        function sendToWhatsApp(event) {
            event.preventDefault();

            const gov = document.getElementById('custGov').value;
            document.getElementById('govError').classList.toggle('hidden', !!gov);
            if (!validateNameInput() || !validatePhoneInput() || !gov) return;

            const product = localStorage.getItem('selectedProduct') || '';
            const name    = document.getElementById('custName').value.trim();
            const phone   = document.getElementById('custPhone').value.trim();
            const address = document.getElementById('custAddress').value.trim();
            const method  = document.getElementById('payMethod').value;
            const total   = baseProductPrice + shippingCostAmount;

            const message =
`🛍️ *طلب جديد من ELBNA STORE*

📦 المنتج: ${product}
💰 السعر: ${baseProductPrice} ج.م
🚚 الشحن: ${shippingCostAmount} ج.م
💵 الإجمالي: ${total} ج.م

👤 الاسم: ${name}
📱 الموبايل: ${phone}
📍 المحافظة: ${gov}
🏠 العنوان: ${address}
💳 الدفع: ${method}`;

            window.open(`https://wa.me/201006544789?text=${encodeURIComponent(message)}`, '_blank');
            window.location.href = 'success.html';
        }
    </script>
</body>
</html>
