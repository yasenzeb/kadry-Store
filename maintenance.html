<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صفحة الصيانة - KADRY Store</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Cairo', sans-serif;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #fff 0%, #fbfbfb 50%, #f5f5f5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      direction: rtl;
    }

    /* الخلفية المتحركة */
    .stars {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      animation: float 6s ease-in-out infinite;
    }

    .stars:nth-child(1) { top: 20%; left: 15%; animation-delay: 0s; }
    .stars:nth-child(2) { top: 50%; left: 80%; animation-delay: 1s; }
    .stars:nth-child(3) { top: 70%; left: 20%; animation-delay: 2s; }
    .stars:nth-child(4) { top: 30%; left: 75%; animation-delay: 0.5s; }
    .stars:nth-child(5) { top: 80%; left: 60%; animation-delay: 1.5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.5; }
      50% { transform: translateY(-20px) translateX(10px); opacity: 1; }
    }

    .container {
      position: relative;
      text-align: center;
      z-index: 10;
      background: rgba(255, 255, 255, 0.98);
      padding: 60px 40px;
      border-radius: 0;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      max-width: 600px;
      backdrop-filter: blur(10px);
      animation: slideUp 0.8s ease-out;
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* الأيقونة الرئيسية */
    .icon {
      font-size: 80px;
      margin-bottom: 30px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.1); }
    }

    .wrench {
      display: inline-block;
      animation: rotate 3s linear infinite;
      transform-origin: 50% 50%;
    }

    @keyframes rotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h1 {
      font-size: 48px;
      color: #000;
      margin-bottom: 15px;
      font-weight: 900;
      background: linear-gradient(135deg, #000 0%, #444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    .subtitle {
      font-size: 24px;
      color: #333;
      margin-bottom: 20px;
      font-weight: 700;
      animation: fadeIn 1s ease-out 0.5s both;
    }

    .description {
      font-size: 16px;
      color: #666;
      line-height: 1.8;
      margin-bottom: 40px;
      animation: fadeIn 1s ease-out 0.7s both;
    }

    /* النقاط المتحركة */
    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 30px 0;
      animation: fadeIn 1s ease-out 0.9s both;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: linear-gradient(135deg, #000 0%, #333 100%);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    /* الزر */
    .button-group {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeIn 1s ease-out 1.1s both;
    }

    .btn {
      padding: 15px 35px;
      border: none;
      border-radius: 0;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #000 0%, #2a2a2a 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
    }

    .btn-secondary {
      background: white;
      color: #000;
      border: 2px solid #000;
    }

    .btn-secondary:hover {
      background: linear-gradient(135deg, #000 0%, #333 100%);
      color: white;
      transform: translate(-2px, -2px);
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.15);
    }

    /* البريد الإلكتروني */
    .email-input {
      width: 100%;
      padding: 12px 20px;
      border: 2px solid #000;
      border-radius: 0;
      font-size: 14px;
      margin-bottom: 15px;
      transition: all 0.3s ease;
      font-family: 'Cairo', sans-serif;
      font-weight: 600;
    }

    .email-input:focus {
      outline: none;
      border-color: #000;
      box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.08);
      transform: scale(1.02);
    }

    /* التأثيرات العائمة */
    .floating-shape {
      position: absolute;
      opacity: 0.05;
      z-index: 1;
      animation: floatShape 20s ease-in-out infinite;
    }

    .shape-1 {
      width: 300px;
      height: 300px;
      background: #000;
      border-radius: 40% 60% 70% 30%;
      top: -100px;
      left: -100px;
    }

    .shape-2 {
      width: 250px;
      height: 250px;
      background: #333;
      border-radius: 30% 70% 40% 60%;
      bottom: -100px;
      right: -100px;
      animation-delay: 2s;
    }

    @keyframes floatShape {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(20px, -20px) rotate(90deg); }
      50% { transform: translate(-20px, -30px) rotate(180deg); }
      75% { transform: translate(30px, 20px) rotate(270deg); }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 40px 25px;
      }

      h1 {
        font-size: 36px;
      }

      .subtitle {
        font-size: 20px;
      }

      .icon {
        font-size: 60px;
      }

      .btn {
        padding: 12px 25px;
        font-size: 14px;
      }
    }

    .success-message {
      font-size: 14px;
      color: #000;
      margin-top: 20px;
      padding: 15px;
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.04) 0%, rgba(0, 0, 0, 0.02) 100%);
      border-radius: 0;
      border-right: 4px solid #000;
      animation: slideDown 0.6s ease-out 1.3s both;
      font-weight: 700;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <!-- الخلفية -->
  <div class="stars"></div>
  <div class="stars"></div>
  <div class="stars"></div>
  <div class="stars"></div>
  <div class="stars"></div>

  <div class="floating-shape shape-1"></div>
  <div class="floating-shape shape-2"></div>

  <!-- المحتوى الرئيسي -->
  <div class="container">
    <div class="icon">
      <span class="wrench">🔧</span>
    </div>

    <h1>تحت الصيانة</h1>
    <div class="subtitle">جاري تحسين الخدمة</div>

    <p class="description">
      نحن نعمل بجد لتقديم لك تجربة أفضل وأكثر سلاسة.
      <br>
      شكراً لصبرك معنا! 💪
    </p>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <p class="description" style="margin-bottom: 25px;">
      <strong>تقدر تنورنا في أي وقت تاني</strong>
      <br>
      ودع لنا بريدك الإلكتروني لإخبارك عندما نعود!
    </p>

    <input 
      type="email" 
      class="email-input" 
      placeholder="البريد الإلكتروني"
      dir="rtl"
    >

    <div class="button-group">
      <button class="btn btn-primary" onclick="subscribeEmail()">
        أخبرني عند العودة
      </button>
      <button class="btn btn-secondary" onclick="goHome()">
        العودة للرئيسية
      </button>
    </div>

    <div class="success-message" id="successMsg" style="display: none;">
      ✓ تم حفظ بريدك بنجاح! سننوّرك قريباً 📧
    </div>
  </div>

  <script>
    function subscribeEmail() {
      const email = document.querySelector('.email-input').value;
      if (email && email.includes('@')) {
        const successMsg = document.getElementById('successMsg');
        successMsg.style.display = 'block';
        document.querySelector('.email-input').value = '';
        setTimeout(() => {
          successMsg.style.display = 'none';
        }, 5000);
      } else {
        alert('من فضلك أدخل بريد إلكتروني صحيح');
      }
    }

    function goHome() {
      window.location.href = 'index.html';
    }

    // السماح بالضغط على Enter للإرسال
    document.querySelector('.email-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        subscribeEmail();
      }
    });
  </script>
</body>
</html>
